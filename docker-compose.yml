version: '3.8'

services:
  # ==================== PDF MCP Server ====================
  pdf-mcp:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: pdf-mcp:latest
    container_name: pdf-mcp
    ports:
      - "${MCP_PORT:-8001}:8001"
    environment:
      - RUST_LOG=${LOG_LEVEL:-info}
      - HTTP_PORT=8001
      - KNOWLEDGE_BASE=/app/knowledge
      - STORAGE_TYPE=local
      - STORAGE_LOCAL_DIR=/app/data
      - CACHE_ENABLED=${CACHE_ENABLED:-true}
      - CACHE_MAX_SIZE=${CACHE_MAX_SIZE:-1000}
      - CACHE_TTL_SECONDS=${CACHE_TTL:-3600}
      - VLM_ENDPOINT=${VLM_ENDPOINT:-}
      - VLM_API_KEY=${VLM_API_KEY:-}
      - VLM_MODEL=${VLM_MODEL:-gpt-4o}
      - AUDIT_ENABLED=${AUDIT_ENABLED:-true}
      - AUDIT_LOG_DIR=/app/logs/audit
      - AUDIT_RETENTION_DAYS=${AUDIT_RETENTION_DAYS:-30}
      - DEPLOYMENT_MODE=docker
    volumes:
      - ./test_kb:/app/knowledge
      - pdf_data:/app/data
      - pdf_logs:/app/logs
      - pdf_cache:/app/cache
      - ./knowledge_base/.update:/app/.update
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - pdf-network
    command: ["pdf-mcp"]

volumes:
  pdf_knowledge:
    driver: local
  pdf_data:
    driver: local
  pdf_logs:
    driver: local
  pdf_cache:
    driver: local

networks:
  pdf-network:
    driver: bridge
