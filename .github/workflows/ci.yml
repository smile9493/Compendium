name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  PDFIUM_CHROMIUM_VERSION: "7825"

jobs:
  # ═══════════════════════════════════════════════════════════════
  # Fast gate: format + check — must pass first
  # ═══════════════════════════════════════════════════════════════

  check:
    name: Check (fmt + compile)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pdf-module-rs
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: pdf-module-rs -> target
          shared-key: ci

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: pdf-module-rs/crates/pdf-mcp/pdf-web-ui/package-lock.json

      - name: Verify pdf-web-ui (build, unit, e2e)
        uses: ./.github/actions/pdf-web-ui-verify
        with:
          working-directory: pdf-module-rs/crates/pdf-mcp/pdf-web-ui

      - name: Check compilation (all targets, all features)
        run: cargo check --workspace --all-targets --all-features

      - name: Check compilation (no default features)
        run: cargo check --workspace --no-default-features

  # ═══════════════════════════════════════════════════════════════
  # Release binaries — link + optimize path (PDFium)
  # ═══════════════════════════════════════════════════════════════

  release-build:
    name: Release binaries (Linux)
    runs-on: ubuntu-latest
    needs: check
    defaults:
      run:
        working-directory: pdf-module-rs
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: pdf-module-rs -> target
          shared-key: ci

      - name: Setup PDFium
        uses: ./.github/actions/setup-pdfium
        with:
          chromium-version: ${{ env.PDFIUM_CHROMIUM_VERSION }}

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config

      - name: Build release binaries
        run: cargo build --release --bin pdf-mcp --bin pdf-cli

      - name: Verify release artifacts
        run: |
          test -x target/release/pdf-mcp
          test -x target/release/pdf-cli
          file target/release/pdf-mcp target/release/pdf-cli
          ls -lh target/release/pdf-mcp target/release/pdf-cli

      - name: Upload pdf-mcp binary
        uses: actions/upload-artifact@v4
        with:
          name: pdf-mcp-linux
          path: pdf-module-rs/target/release/pdf-mcp
          retention-days: 1

  # ═══════════════════════════════════════════════════════════════
  # MCP Protocol Compliance — verify JSON-RPC conformance
  # ═══════════════════════════════════════════════════════════════

  protocol-compliance:
    name: MCP Protocol Compliance
    needs: release-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download pdf-mcp binary
        uses: actions/download-artifact@v4
        with:
          name: pdf-mcp-linux
          path: target/release

      - name: Make binary executable
        run: chmod +x target/release/pdf-mcp

      - name: Test initialize response
        run: |
          RESPONSE=$(echo '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"test","version":"1.0"}}}' | timeout 10 target/release/pdf-mcp 2>/dev/null || true)
          echo "$RESPONSE" | python3 -c "
          import sys, json
          data = json.loads(sys.stdin.read())
          assert data.get('jsonrpc') == '2.0', 'Missing jsonrpc field'
          assert 'result' in data, 'Missing result field'
          result = data['result']
          assert 'capabilities' in result, 'Missing capabilities'
          assert 'serverInfo' in result, 'Missing serverInfo'
          print('initialize: PASS')
          "

      - name: Test tools/list response
        run: |
          RESPONSE=$(printf '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"test","version":"1.0"}}}\n{"jsonrpc":"2.0","id":2,"method":"tools/list","params":{}}\n' | timeout 10 target/release/pdf-mcp 2>/dev/null || true)
          # Get the tools/list response (second line)
          TOOLS_RESPONSE=$(echo "$RESPONSE" | tail -1)
          echo "$TOOLS_RESPONSE" | python3 -c "
          import sys, json
          data = json.loads(sys.stdin.read())
          assert data.get('jsonrpc') == '2.0'
          assert 'result' in data
          tools = data['result'].get('tools', [])
          assert len(tools) > 0, 'No tools returned'
          for tool in tools:
              assert 'name' in tool, f'Tool missing name: {tool}'
              assert 'description' in tool, f'Tool missing description: {tool}'
              assert 'inputSchema' in tool, f'Tool missing inputSchema: {tool}'
          print(f'tools/list: PASS ({len(tools)} tools)')
          "

      - name: Test tools/call response (schema validation)
        run: |
          # Test that tools/call returns valid JSON-RPC with content array
          INIT='{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"test","version":"1.0"}}}'
          CALL='{"jsonrpc":"2.0","id":2,"method":"tools/call","params":{"name":"search_knowledge","arguments":{"query":"test","knowledge_base":"/tmp/kb"}}}'
          RESPONSE=$(printf '%s\n%s\n' "$INIT" "$CALL" | timeout 15 target/release/pdf-mcp 2>/dev/null || true)
          CALL_RESPONSE=$(echo "$RESPONSE" | tail -1)
          echo "$CALL_RESPONSE" | python3 -c "
          import sys, json
          data = json.loads(sys.stdin.read())
          assert data.get('jsonrpc') == '2.0', 'Missing jsonrpc field'
          assert 'id' in data, 'Missing id field'
          # tools/call must return either result or error, not both
          has_result = 'result' in data
          has_error = 'error' in data
          assert has_result or has_error, 'Response must have result or error'
          if has_result:
              result = data['result']
              assert 'content' in result, 'Missing content in result'
              assert isinstance(result['content'], list), 'content must be array'
          print('tools/call: PASS')
          "

  # ═══════════════════════════════════════════════════════════════
  # Clippy strict lint — deny all warnings
  # ═══════════════════════════════════════════════════════════════

  clippy:
    name: Clippy (strict)
    runs-on: ubuntu-latest
    needs: check
    defaults:
      run:
        working-directory: pdf-module-rs
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: pdf-module-rs -> target
          shared-key: ci

      - name: Run clippy (all targets, all features)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  # ═══════════════════════════════════════════════════════════════
  # Matrix test: multi Rust version × multi OS
  # ═══════════════════════════════════════════════════════════════

  test:
    name: Test (${{ matrix.toolchain }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: check
    defaults:
      run:
        working-directory: pdf-module-rs
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        toolchain: [stable, "1.91.0"]
        include:
          - os: ubuntu-latest
            toolchain: nightly
    continue-on-error: ${{ matrix.toolchain == 'nightly' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (${{ matrix.toolchain }})
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: pdf-module-rs -> target
          shared-key: ci-${{ matrix.os }}-${{ matrix.toolchain }}

      - name: Setup PDFium
        if: matrix.os == 'ubuntu-latest'
        uses: ./.github/actions/setup-pdfium
        with:
          chromium-version: ${{ env.PDFIUM_CHROMIUM_VERSION }}

      - name: Setup Node.js
        if: matrix.os == 'ubuntu-latest'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: pdf-module-rs/crates/pdf-mcp/pdf-web-ui/package-lock.json

      - name: Build SPA (pdf-web-ui)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd crates/pdf-mcp/pdf-web-ui
          npm ci
          npm run build

      - name: Run tests (ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: cargo test --workspace --all-features --verbose

      - name: Run tests (macOS — skip PDFium)
        if: matrix.os == 'macos-latest'
        run: |
          cargo test --workspace --no-default-features --verbose || true
          cargo test --workspace --all-features --verbose || true

      - name: Run doc tests
        run: cargo test --doc --all-features --verbose

  # ═══════════════════════════════════════════════════════════════
  # Feature matrix: verify no feature combination breaks
  # ═══════════════════════════════════════════════════════════════

  feature-check:
    name: Feature Matrix
    runs-on: ubuntu-latest
    needs: check
    defaults:
      run:
        working-directory: pdf-module-rs
    strategy:
      fail-fast: false
      matrix:
        feature-set:
          - "--all-features"
          - "--no-default-features"
          - "--features knowledge"
          - "--features vlm"
          - "-p pdf-common --all-features"
          - "-p pdf-common --no-default-features"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-hack
        uses: taiki-e/install-action@cargo-hack

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: pdf-module-rs -> target
          shared-key: ci

      - name: Check compilation (${{ matrix.feature-set }})
        run: |
          cargo hack check --workspace --each-feature --optional-deps 2>/dev/null || \
          cargo check --workspace ${{ matrix.feature-set }}

  # ═══════════════════════════════════════════════════════════════
  # Documentation (rustdoc)
  # ═══════════════════════════════════════════════════════════════

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    needs: check
    defaults:
      run:
        working-directory: pdf-module-rs
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: pdf-module-rs -> target
          shared-key: ci

      - name: Build documentation (all features)
        run: cargo doc --no-deps --document-private-items --workspace --all-features

  # ═══════════════════════════════════════════════════════════════
  # WASM compilation check
  # ═══════════════════════════════════════════════════════════════

  wasm-check:
    name: WASM Check
    runs-on: ubuntu-latest
    needs: check
    defaults:
      run:
        working-directory: pdf-module-rs
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: pdf-module-rs -> target
          shared-key: ci

      - name: Check WASM compilation
        run: cargo check --target wasm32-unknown-unknown --package pdf-wasm

  # ═══════════════════════════════════════════════════════════════
  # Security & License audit
  # ═══════════════════════════════════════════════════════════════

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: check
    defaults:
      run:
        working-directory: pdf-module-rs
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: pdf-module-rs -> target
          shared-key: ci

      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny

      - name: Run cargo-deny (advisories)
        run: cargo deny check advisories

      - name: Run cargo-deny (licenses)
        run: cargo deny check licenses

      - name: Run cargo-deny (bans + sources)
        run: cargo deny check bans sources

      - name: Run RustSec advisory check
        uses: actions-rust-lang/audit@v2
        with:
          fail-on-severity: medium
          deny-unaudited: false
          manifest-path: pdf-module-rs/Cargo.toml

  # ═══════════════════════════════════════════════════════════════
  # Minimal versions: verify Cargo.toml declares correct minimum deps
  # ═══════════════════════════════════════════════════════════════

  minimal-versions:
    name: Minimal Versions
    runs-on: ubuntu-latest
    needs: check
    defaults:
      run:
        working-directory: pdf-module-rs
    steps:
      - uses: actions/checkout@v4

      - name: Install nightly Rust
        uses: dtolnay/rust-toolchain@nightly

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: pdf-module-rs -> target
          shared-key: ci

      - name: Update to minimum compatible versions
        run: cargo +nightly update -Z direct-minimal-versions

      - name: Check compilation with minimal deps
        run: cargo +nightly check --workspace --all-targets

  # ═══════════════════════════════════════════════════════════════
  # Code coverage
  # ═══════════════════════════════════════════════════════════════

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: [clippy, test, release-build]
    defaults:
      run:
        working-directory: pdf-module-rs
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: pdf-module-rs -> target
          shared-key: ci

      - name: Setup PDFium
        uses: ./.github/actions/setup-pdfium
        with:
          chromium-version: ${{ env.PDFIUM_CHROMIUM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: pdf-module-rs/crates/pdf-mcp/pdf-web-ui/package-lock.json

      - name: Build SPA (pdf-web-ui)
        run: |
          cd pdf-module-rs/crates/pdf-mcp/pdf-web-ui
          npm ci
          npm run build
        working-directory: pdf-module-rs

      - name: Generate coverage
        run: cargo llvm-cov --all-features --workspace --exclude pdf-wasm --lcov --output-path lcov.info

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: pdf-module-rs/lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # ═══════════════════════════════════════════════════════════════
  # Benchmark: run criterion + compare against main baseline
  # ═══════════════════════════════════════════════════════════════

  bench:
    name: Benchmark
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: pdf-module-rs
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: pdf-module-rs -> target
          shared-key: ci

      - name: Run benchmarks
        run: |
          cargo bench --bench extractor_bench -- \
            --output-format bencher 2>/dev/null \
            | tee bench_results.txt

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: cargo
          output-file-path: pdf-module-rs/bench_results.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          # Fail the PR if any benchmark regresses by more than 20%
          alert-threshold: '120%'
          comment-on-alert: true
          fail-on-alert: true
