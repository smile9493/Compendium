name: Build and Release

on:
  push:
    branches: [main]
    paths:
      - 'pdf-module-rs/**'
      - 'pdf-mcp-installer/**'
      - '.github/workflows/build.yml'
      - '.github/actions/setup-pdfium/**'
      - 'install.sh'
      - 'deploy.sh'
    tags:
      - 'v*'
  pull_request:
    branches: [main]
    paths:
      - 'pdf-module-rs/**'
      - 'pdf-mcp-installer/**'
      - '.github/workflows/build.yml'
      - '.github/actions/setup-pdfium/**'
      - 'install.sh'
      - 'deploy.sh'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  PDFIUM_CHROMIUM_VERSION: "7825"

jobs:
  test-rust:
    name: Test Rust
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: pdf-module-rs -> target
          shared-key: release

      - name: Setup PDFium
        uses: ./.github/actions/setup-pdfium
        with:
          chromium-version: ${{ env.PDFIUM_CHROMIUM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: pdf-module-rs/crates/pdf-mcp/pdf-web-ui/package-lock.json

      - name: Verify pdf-web-ui (build, unit, e2e)
        uses: ./.github/actions/pdf-web-ui-verify
        with:
          working-directory: pdf-module-rs/crates/pdf-mcp/pdf-web-ui

      - name: Run doc tests (pdf-module-rs)
        run: |
          cd pdf-module-rs
          cargo test --doc --workspace --all-features --exclude pdf-wasm

      - name: Run tests (pdf-module-rs)
        run: |
          cd pdf-module-rs
          cargo test --all-targets --workspace --all-features --exclude pdf-wasm

      - name: Verify OpenAPI fixture and generated types
        run: |
          cd pdf-module-rs
          cargo test -p pdf-mcp api_doc::tests::openapi_fixture_matches_code
          cd crates/pdf-mcp/pdf-web-ui
          npm run generate:api
          git diff --exit-code ../tests/fixtures/openapi.json src/api/generated.d.ts

      - name: Run clippy (pdf-module-rs)
        run: |
          cd pdf-module-rs
          cargo clippy --all-targets -- -D warnings

      - name: Run clippy (pdf-mcp-installer)
        run: |
          cd pdf-mcp-installer
          cargo clippy --all-targets -- -D warnings

      - name: Check formatting (pdf-module-rs)
        run: |
          cd pdf-module-rs
          cargo fmt --all -- --check

      - name: Check formatting (pdf-mcp-installer)
        run: |
          cd pdf-mcp-installer
          cargo fmt --all -- --check

      - name: Check documentation
        run: |
          cd pdf-module-rs
          cargo doc --no-deps --document-private-items --workspace --all-features --exclude pdf-wasm

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: Security audit with cargo-deny (pdf-module-rs)
        run: |
          cd pdf-module-rs
          cargo deny check advisories

      - name: Security audit with cargo-deny (pdf-mcp-installer)
        run: |
          cd pdf-mcp-installer
          cargo deny check advisories

  code-coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: pdf-module-rs -> target
          shared-key: release

      - name: Setup PDFium
        uses: ./.github/actions/setup-pdfium
        with:
          chromium-version: ${{ env.PDFIUM_CHROMIUM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: pdf-module-rs/crates/pdf-mcp/pdf-web-ui/package-lock.json

      - name: Build SPA (pdf-web-ui)
        run: |
          cd pdf-module-rs/crates/pdf-mcp/pdf-web-ui
          npm ci
          npm run build

      - name: Generate coverage
        run: |
          cd pdf-module-rs
          cargo llvm-cov --all-features --workspace --exclude pdf-wasm --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: pdf-module-rs/lcov.info
          fail_ci_if_error: false

  wasm-build:
    name: WASM Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: pdf-module-rs -> target
          shared-key: release

      - name: Build WASM (pdf-wasm)
        run: |
          cd pdf-module-rs
          cargo build --target wasm32-unknown-unknown --package pdf-wasm --release

      - name: Package WASM artifacts
        run: |
          mkdir -p wasm-dist
          cp pdf-module-rs/target/wasm32-unknown-unknown/release/*.wasm wasm-dist/ 2>/dev/null || true
          echo "WASM build completed (package: pdf-wasm)"

  build-mcp:
    name: Build MCP Server (Linux x86_64)
    needs: [test-rust, security-audit]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: pdf-module-rs -> target
          shared-key: release

      - name: Setup PDFium
        uses: ./.github/actions/setup-pdfium
        with:
          chromium-version: ${{ env.PDFIUM_CHROMIUM_VERSION }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: pdf-module-rs/crates/pdf-mcp/pdf-web-ui/package-lock.json

      - name: Build SPA (pdf-web-ui)
        run: |
          cd pdf-module-rs/crates/pdf-mcp/pdf-web-ui
          npm ci
          npm run build

      - name: Build MCP Server
        run: |
          cd pdf-module-rs
          cargo build --release --bin pdf-mcp

      - name: Build pdf-cli
        run: |
          cd pdf-module-rs
          cargo build --release --bin pdf-cli

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: pdf-mcp-installer -> target
          shared-key: release-installer

      - name: Build pdf-mcp-cli (installer)
        run: |
          cd pdf-mcp-installer
          cargo build --release --bin pdf-mcp-cli

      - name: Optimize binary
        run: |
          cd pdf-module-rs/target/release
          strip pdf-mcp
          ls -lh pdf-mcp
          strip pdf-cli
          ls -lh pdf-cli
          cd $GITHUB_WORKSPACE/pdf-mcp-installer/target/release
          strip pdf-mcp-cli
          ls -lh pdf-mcp-cli

      - name: Package
        run: |
          mkdir -p package
          cp pdf-module-rs/target/release/pdf-mcp package/
          cp pdf-module-rs/target/release/pdf-cli package/
          cp pdf-mcp-installer/target/release/pdf-mcp-cli package/
          tar -czvf $GITHUB_WORKSPACE/pdf-mcp-linux-x64.tar.gz -C package .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pdf-mcp-linux-x64
          path: |
            pdf-mcp-linux-x64.tar.gz

  docker-build:
    name: Docker Image
    needs: [test-rust, security-audit]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ github.repository_owner }}/pdf-mcp
            ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Release
    needs: [build-mcp, wasm-build, docker-build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download MCP artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          name: Release ${{ steps.version.outputs.VERSION }}
          body: |
            ## PDF Module MCP Server ${{ steps.version.outputs.VERSION }}

            ### MCP Server + CLI (Linux x86_64)
            - `pdf-mcp-linux-x64.tar.gz` - Linux x64

            每个包包含：
            - `pdf-mcp` - MCP 服务端
            - `pdf-cli` - 知识库管理 CLI
            - `pdf-mcp-cli` - 配置管理 CLI

            ### Docker Images
            ```bash
            docker pull ${{ github.repository_owner }}/pdf-mcp:${{ steps.version.outputs.VERSION }}
            docker pull ghcr.io/${{ github.repository }}:${{ steps.version.outputs.VERSION }}
            ```

            ### Usage
            See [README.md](https://github.com/${{ github.repository }}#readme)
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
          draft: false
          prerelease: false
