name: Build and Release

on:
  push:
    branches: [main]
    paths:
      - 'pdf-module-rs/**'
      - 'pdf-mcp-installer/**'
      - '.github/workflows/build.yml'
      - 'install.sh'
      - 'deploy.sh'
    tags:
      - 'v*'
  pull_request:
    branches: [main]
    paths:
      - 'pdf-module-rs/**'
      - 'pdf-mcp-installer/**'
      - '.github/workflows/build.yml'
      - 'install.sh'
      - 'deploy.sh'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  PDFIUM_CHROMIUM_VERSION: "7825"

jobs:
  test-rust:
    name: Test Rust
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "pdf-module-rs -> target"

      - name: Download PDFium
        run: |
          curl -L -o pdfium.tgz "https://github.com/bblanchon/pdfium-binaries/releases/download/chromium/${PDFIUM_CHROMIUM_VERSION}/pdfium-linux-x64.tgz"
          tar -xzf pdfium.tgz
          echo "PDFIUM_LIB_PATH=${GITHUB_WORKSPACE}/lib/libpdfium.so" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=${GITHUB_WORKSPACE}/lib:${LD_LIBRARY_PATH}" >> $GITHUB_ENV

      - name: Run tests (pdf-module-rs)
        run: |
          cd pdf-module-rs
          cargo test --all-targets --all-features

      - name: Run clippy (pdf-module-rs)
        run: |
          cd pdf-module-rs
          cargo clippy --all-targets -- -D warnings

      - name: Run clippy (pdf-mcp-installer)
        run: |
          cd pdf-mcp-installer
          cargo clippy --all-targets -- -D warnings

      - name: Check formatting (pdf-module-rs)
        run: |
          cd pdf-module-rs
          cargo fmt --all -- --check

      - name: Check formatting (pdf-mcp-installer)
        run: |
          cd pdf-mcp-installer
          cargo fmt --all -- --check

      - name: Check documentation
        run: |
          cd pdf-module-rs
          cargo doc --no-deps --all-features

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: Security audit with cargo-deny (pdf-module-rs)
        run: |
          cd pdf-module-rs
          cargo deny check advisories

      - name: Security audit with cargo-deny (pdf-mcp-installer)
        run: |
          cd pdf-mcp-installer
          cargo deny check advisories

  code-coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "pdf-module-rs -> target"

      - name: Download PDFium
        run: |
          curl -L -o pdfium.tgz "https://github.com/bblanchon/pdfium-binaries/releases/download/chromium/${PDFIUM_CHROMIUM_VERSION}/pdfium-linux-x64.tgz"
          tar -xzf pdfium.tgz
          echo "PDFIUM_LIB_PATH=${GITHUB_WORKSPACE}/lib/libpdfium.so" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=${GITHUB_WORKSPACE}/lib:${LD_LIBRARY_PATH}" >> $GITHUB_ENV

      - name: Generate coverage
        run: |
          cd pdf-module-rs
          cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: pdf-module-rs/lcov.info
          fail_ci_if_error: false

  wasm-build:
    name: WASM Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "pdf-module-rs -> target"

      - name: Build WASM (pdf-wasm)
        run: |
          cd pdf-module-rs
          cargo build --target wasm32-unknown-unknown --package pdf-wasm --release

      - name: Package WASM artifacts
        run: |
          mkdir -p wasm-dist
          cp pdf-module-rs/target/wasm32-unknown-unknown/release/*.wasm wasm-dist/ 2>/dev/null || true
          echo "WASM build completed (package: pdf-wasm)"

  build-mcp:
    name: MCP (${{ matrix.target }})
    needs: [test-rust, security-audit]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: pdf-mcp-linux-x64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: pdf-mcp-linux-arm64
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: pdf-mcp-linux-x64-musl
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: pdf-mcp-macos-x64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: pdf-mcp-macos-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: pdf-mcp-windows-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compiler (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu libssl-dev

      - name: Install musl cross-compiler (Linux x86_64 musl)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools libssl-dev

      - name: Install OpenSSL (Linux x64)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      - name: Setup macOS ARM64 target
        if: matrix.target == 'aarch64-apple-darwin'
        run: |
          rustup target add aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "pdf-module-rs -> target"

      - name: Setup environment for cross-compilation
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++" >> $GITHUB_ENV
          echo "STRIP_CMD=aarch64-linux-gnu-strip" >> $GITHUB_ENV

      - name: Download PDFium (Linux x64)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          curl -L -o pdfium.tgz "https://github.com/bblanchon/pdfium-binaries/releases/download/chromium/${PDFIUM_CHROMIUM_VERSION}/pdfium-linux-x64.tgz"
          tar -xzf pdfium.tgz
          echo "PDFIUM_LIB_PATH=${GITHUB_WORKSPACE}/lib/libpdfium.so" >> $GITHUB_ENV

      - name: Download PDFium (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          curl -L -o pdfium.tgz "https://github.com/bblanchon/pdfium-binaries/releases/download/chromium/${PDFIUM_CHROMIUM_VERSION}/pdfium-linux-arm64.tgz"
          tar -xzf pdfium.tgz
          echo "PDFIUM_LIB_PATH=${GITHUB_WORKSPACE}/lib/libpdfium.so" >> $GITHUB_ENV

      - name: Download PDFium (Linux musl x64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          curl -L -o pdfium.tgz "https://github.com/bblanchon/pdfium-binaries/releases/download/chromium/${PDFIUM_CHROMIUM_VERSION}/pdfium-linux-musl-x64.tgz"
          tar -xzf pdfium.tgz
          echo "PDFIUM_LIB_PATH=${GITHUB_WORKSPACE}/lib/libpdfium.so" >> $GITHUB_ENV

      - name: Download PDFium (macOS x64)
        if: matrix.target == 'x86_64-apple-darwin'
        run: |
          curl -L -o pdfium.tgz "https://github.com/bblanchon/pdfium-binaries/releases/download/chromium/${PDFIUM_CHROMIUM_VERSION}/pdfium-mac-x64.tgz"
          tar -xzf pdfium.tgz
          echo "PDFIUM_LIB_PATH=${GITHUB_WORKSPACE}/lib/libpdfium.dylib" >> $GITHUB_ENV

      - name: Download PDFium (macOS ARM64)
        if: matrix.target == 'aarch64-apple-darwin'
        run: |
          curl -L -o pdfium.tgz "https://github.com/bblanchon/pdfium-binaries/releases/download/chromium/${PDFIUM_CHROMIUM_VERSION}/pdfium-mac-arm64.tgz"
          tar -xzf pdfium.tgz
          echo "PDFIUM_LIB_PATH=${GITHUB_WORKSPACE}/lib/libpdfium.dylib" >> $GITHUB_ENV

      - name: Download PDFium (Windows x64)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        run: |
          curl -L -o pdfium.tgz "https://github.com/bblanchon/pdfium-binaries/releases/download/chromium/${PDFIUM_CHROMIUM_VERSION}/pdfium-win-x64.tgz"
          tar -xzf pdfium.tgz
          echo "PDFIUM_LIB_PATH=${GITHUB_WORKSPACE}/lib/pdfium.dll" >> $GITHUB_ENV

      - name: Build MCP Server
        run: |
          cd pdf-module-rs
          cargo build --release --target ${{ matrix.target }} --bin pdf-mcp

      - name: Build pdf-cli
        run: |
          cd pdf-module-rs
          cargo build --release --target ${{ matrix.target }} --bin pdf-cli

      - name: Build pdf-mcp-cli (installer)
        run: |
          cd pdf-mcp-installer
          cargo build --release --target ${{ matrix.target }} --bin pdf-mcp-cli

      - name: Optimize binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cd pdf-module-rs/target/${{ matrix.target }}/release
          STRIP="${STRIP_CMD:-strip}"
          $STRIP pdf-mcp
          ls -lh pdf-mcp
          $STRIP pdf-cli
          ls -lh pdf-cli
          cd $GITHUB_WORKSPACE/pdf-mcp-installer/target/${{ matrix.target }}/release
          $STRIP pdf-mcp-cli
          ls -lh pdf-mcp-cli

      - name: Optimize binary (Windows)
        if: runner.os == 'Windows'
        run: |
          cd pdf-module-rs/target/${{ matrix.target }}/release
          strip pdf-mcp.exe
          dir pdf-mcp.exe
          strip pdf-cli.exe
          dir pdf-cli.exe
          cd ${{ github.workspace }}/pdf-mcp-installer/target/${{ matrix.target }}/release
          strip pdf-mcp-cli.exe
          dir pdf-mcp-cli.exe

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p package
          cp pdf-module-rs/target/${{ matrix.target }}/release/pdf-mcp package/
          cp pdf-module-rs/target/${{ matrix.target }}/release/pdf-cli package/
          cp pdf-mcp-installer/target/${{ matrix.target }}/release/pdf-mcp-cli package/
          tar -czvf $GITHUB_WORKSPACE/${{ matrix.artifact }}.tar.gz -C package .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir package
          copy pdf-module-rs/target/${{ matrix.target }}/release/pdf-mcp.exe package/
          copy pdf-module-rs/target/${{ matrix.target }}/release/pdf-cli.exe package/
          copy pdf-mcp-installer/target/${{ matrix.target }}/release/pdf-mcp-cli.exe package/
          7z a ${{ github.workspace }}/${{ matrix.artifact }}.zip ./package/*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.zip

  docker-build:
    name: Docker Image
    needs: [test-rust, security-audit]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ github.repository_owner }}/pdf-mcp
            ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Release
    needs: [build-mcp, wasm-build, docker-build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download MCP artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          name: Release ${{ steps.version.outputs.VERSION }}
          body: |
            ## PDF Module MCP Server ${{ steps.version.outputs.VERSION }}

            ### MCP Server + CLI (多平台)
            - `pdf-mcp-linux-x64.tar.gz` - Linux x64
            - `pdf-mcp-linux-arm64.tar.gz` - Linux ARM64
            - `pdf-mcp-linux-x64-musl.tar.gz` - Linux x64 (musl)
            - `pdf-mcp-macos-x64.tar.gz` - macOS x64
            - `pdf-mcp-macos-arm64.tar.gz` - macOS ARM64
            - `pdf-mcp-windows-x64.zip` - Windows x64

            每个包包含：
            - `pdf-mcp` - MCP 服务端
            - `pdf-cli` - 知识库管理 CLI
            - `pdf-mcp-cli` - 配置管理 CLI

            ### Docker Images
            ```bash
            docker pull ${{ github.repository_owner }}/pdf-mcp:${{ steps.version.outputs.VERSION }}
            docker pull ghcr.io/${{ github.repository }}:${{ steps.version.outputs.VERSION }}
            ```

            ### Usage
            See [README.md](https://github.com/${{ github.repository }}#readme)
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
          draft: false
          prerelease: false
