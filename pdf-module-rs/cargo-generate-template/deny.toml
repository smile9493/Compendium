# cargo-deny configuration for {{project-name}}
# Usage:
#   cargo deny check                    # Full check
#   cargo deny check licenses           # License compliance only
#   cargo deny check advisories         # Security advisories only
#   cargo deny check bans               # Banned dependencies only

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
vulnerability = "deny"
unmaintained = "warn"
unsound = "deny"
yanked = "warn"
notice = "warn"
ignore = []
severity-threshold = "medium"

[licenses]
unlicensed = "deny"
allow-osi-fsf-free = "neither"
default = "deny"
confidence-threshold = 0.8
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "CC0-1.0",
    "Unicode-3.0",
]
exceptions = []

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []