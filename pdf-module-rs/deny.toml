# cargo-deny configuration
# 遵循 rust-architecture-guide P1 安全基线
#
# Usage:
#   cargo deny check                    # 全部检查
#   cargo deny check licenses           # 仅许可证
#   cargo deny check advisories         # 仅安全公告
#   cargo deny check bans               # 仅依赖禁令

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
# cargo-deny 0.17+: scope filters (all | workspace | transitive | none).
# vulnerability / notice / severity-threshold removed — always error when matched.
# workspace: error only on direct workspace deps (replaces old unmaintained = "warn" noise model).
unmaintained = "workspace"
unsound = "all"
yanked = "warn"
ignore = [
    # bincode team ceased development; v1.3.3 is feature-complete for our cache format.
    { id = "RUSTSEC-2025-0141", reason = "direct pdf-core cache dep; migration to postcard tracked separately" },
    # lru 0.12 pulled in by tantivy 0.22; fixed in lru >=0.16.3 once tantivy upgrades.
    { id = "RUSTSEC-2026-0002", reason = "transitive via tantivy; no workspace-controlled upgrade path yet" },
]

[licenses]
# cargo-deny 0.18+: allow-list only (unlicensed / default / allow-osi-fsf-free removed).
confidence-threshold = 0.8
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "CC0-1.0",
    "Unicode-3.0",
    "CDLA-Permissive-2.0",
    "MPL-2.0",
]
exceptions = []

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
# Explicitly ban crates with known issues or preferred alternatives
deny = []
# Skip these crates when checking for duplicate versions
skip = []
# Ignore duplicate versions for hard-to-dedup crates
skip-tree = []

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []