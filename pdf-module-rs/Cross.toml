# Cross-compilation configuration for `cross`.
#
# Builds for multiple targets without installing cross-compilers locally.
#
# Install:  cargo install cross
# Usage:
#   cross build --target aarch64-unknown-linux-gnu --release
#   cross build --target x86_64-pc-windows-gnu --release
#   cross test  --target aarch64-unknown-linux-gnu
#
# See: https://github.com/cross-rs/cross

[target.aarch64-unknown-linux-gnu]
pre-build = [
    "dpkg --add-architecture arm64",
    "apt-get update",
    "apt-get install -y libssl-dev:arm64 pkg-config:arm64",
]

[target.x86_64-pc-windows-gnu]
pre-build = [
    "apt-get update",
    "apt-get install -y mingw-w64",
]

[target.x86_64-apple-darwin]
pre-build = []

[target.aarch64-apple-darwin]
pre-build = []

[build]
build-std = false
xargo = false

[build.env]
passthrough = [
    "RUST_BACKTRACE",
    "RUST_LOG",
    "CARGO_BUILD_TARGET_DIR",
]