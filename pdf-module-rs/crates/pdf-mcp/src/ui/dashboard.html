<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="title">知识库仪表盘</title>
<style>
:root {
  --bg: #0f172a;
  --card: #1e293b;
  --border: #334155;
  --text: #e2e8f0;
  --muted: #94a3b8;
  --accent: #3b82f6;
  --green: #22c55e;
  --yellow: #eab308;
  --red: #ef4444;
  --radius: 12px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 24px;
}
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
}
.header h1 {
  font-size: 1.5rem;
  font-weight: 600;
  color: var(--text);
}
.header .subtitle {
  font-size: 0.875rem;
  color: var(--muted);
  margin-top: 4px;
}
.actions {
  display: flex;
  gap: 8px;
  align-items: center;
}
.btn {
  padding: 8px 16px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--card);
  color: var(--text);
  cursor: pointer;
  font-size: 0.875rem;
  transition: all 0.15s;
}
.btn:hover { border-color: var(--accent); background: #1e3a5f; }
.btn.primary { background: var(--accent); border-color: var(--accent); }
.btn.primary:hover { background: #2563eb; }
.lang-select {
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--card);
  color: var(--text);
  font-size: 0.875rem;
  cursor: pointer;
}
.lang-select:hover { border-color: var(--accent); }
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
}
.card .label {
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--muted);
  margin-bottom: 8px;
}
.card .value {
  font-size: 2rem;
  font-weight: 700;
  line-height: 1;
}
.card .detail {
  font-size: 0.8rem;
  color: var(--muted);
  margin-top: 4px;
}
.value.green { color: var(--green); }
.value.yellow { color: var(--yellow); }
.value.red { color: var(--red); }
.value.blue { color: var(--accent); }
.section {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 16px;
}
.section h2 {
  font-size: 1rem;
  font-weight: 600;
  margin-bottom: 12px;
}
.domain-list {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.tag {
  padding: 4px 12px;
  background: #1e3a5f;
  border-radius: 9999px;
  font-size: 0.8rem;
  color: var(--accent);
}
.status-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 16px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 16px;
  font-size: 0.875rem;
}
.dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.dot.green { background: var(--green); }
.dot.yellow { background: var(--yellow); }
.dot.red { background: var(--red); }
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
}
.empty-state h2 { font-size: 1.25rem; margin-bottom: 8px; color: var(--text); }
.chart-container {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
}
.pie-area { width: 180px; height: 180px; flex-shrink: 0; }
.pie-area svg { width: 100%; height: 100%; }
.legend { display: flex; flex-direction: column; gap: 6px; justify-content: center; }
.legend-item { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; }
.legend-color { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
.refreshing { opacity: 0.5; pointer-events: none; }
</style>
</head>
<body>
  <div class="header">
    <div>
      <h1 data-i18n="title">知识库仪表盘</h1>
      <div class="subtitle" id="generated-at" data-i18n="loading">加载中...</div>
    </div>
    <div class="actions">
      <button class="btn" id="btn-refresh" onclick="requestHealth()" data-i18n="btn_refresh">刷新</button>
      <button class="btn primary" id="btn-rebuild" onclick="requestRebuild()" data-i18n="btn_rebuild">重建索引</button>
      <select class="lang-select" id="lang-select" onchange="changeLang(this.value)">
        <option value="zh">中文</option>
        <option value="en">English</option>
      </select>
    </div>
  </div>

  <div class="status-bar" id="status-bar">
    <div class="dot green" id="status-dot"></div>
    <span id="status-text" data-i18n="status_connecting">连接中...</span>
  </div>

  <div id="dashboard-content" style="display:none;">
    <div class="grid" id="metrics-grid">
      <div class="card">
        <div class="label" data-i18n="lbl_total">总条目数</div>
        <div class="value blue" id="total-entries">--</div>
      </div>
      <div class="card">
        <div class="label" data-i18n="lbl_orphan">孤立条目</div>
        <div class="value yellow" id="orphan-count">--</div>
      </div>
      <div class="card">
        <div class="label" data-i18n="lbl_contrad">矛盾条目</div>
        <div class="value red" id="contradiction-count">--</div>
      </div>
      <div class="card">
        <div class="label" data-i18n="lbl_broken">损坏链接</div>
        <div class="value yellow" id="broken-link-count">--</div>
      </div>
      <div class="card">
        <div class="label" data-i18n="lbl_idxsize">索引大小</div>
        <div class="value" id="index-size">--</div>
      </div>
      <div class="card">
        <div class="label" data-i18n="lbl_quality">平均质量</div>
        <div class="value green" id="avg-quality">--</div>
      </div>
      <div class="card">
        <div class="label" data-i18n="lbl_nodes">图谱节点</div>
        <div class="value" id="graph-nodes">--</div>
        <div class="detail" id="graph-edges" data-i18n="lbl_edges">-- 条边</div>
      </div>
      <div class="card">
        <div class="label" data-i18n="lbl_lastcompile">最后编译</div>
        <div class="value" style="font-size:1rem;" id="last-compile">--</div>
      </div>
    </div>

    <div class="section">
      <h2 data-i18n="section_domains">知识领域</h2>
      <div class="domain-list" id="domains-list"></div>
    </div>

    <div class="section">
      <h2 data-i18n="section_distribution">领域分布</h2>
      <div class="chart-container">
        <div class="pie-area" id="pie-chart"></div>
        <div class="legend" id="pie-legend"></div>
      </div>
    </div>
  </div>

  <div id="empty-state" class="empty-state">
    <h2 data-i18n="empty_title">暂无数据</h2>
    <p data-i18n="empty_desc">点击"刷新"获取知识库健康报告。</p>
  </div>

<script>
(function() {
  const i18n = {
    zh: {
      title: '知识库仪表盘',
      loading: '加载中...',
      btn_refresh: '刷新',
      btn_rebuild: '重建索引',
      status_connecting: '连接中...',
      status_fetching: '获取数据中...',
      status_rebuilding: '重建索引中...',
      status_connected_success: '已连接 — 数据加载成功',
      status_connected_empty: '已连接 — 知识库为空',
      status_standalone: '独立模式 — 数据需要 MCP 主机',
      status_standalone_rebuild: '独立模式 — 重建需要 MCP 主机',
      lbl_total: '总条目数',
      lbl_orphan: '孤立条目',
      lbl_contrad: '矛盾条目',
      lbl_broken: '损坏链接',
      lbl_idxsize: '索引大小',
      lbl_quality: '平均质量',
      lbl_nodes: '图谱节点',
      lbl_edges: '-- 条边',
      lbl_lastcompile: '最后编译',
      section_domains: '知识领域',
      section_distribution: '领域分布',
      empty_title: '暂无数据',
      empty_desc: '点击"刷新"获取知识库健康报告。',
      msg_error_parse: '解析数据错误: ',
      generated: '生成时间: ',
    },
    en: {
      title: 'Knowledge Base Dashboard',
      loading: 'Loading...',
      btn_refresh: 'Refresh',
      btn_rebuild: 'Rebuild Index',
      status_connecting: 'Connecting...',
      status_fetching: 'Fetching data...',
      status_rebuilding: 'Rebuilding indexes...',
      status_connected_success: 'Connected — data loaded successfully',
      status_connected_empty: 'Connected — empty knowledge base',
      status_standalone: 'Standalone mode — data requires MCP host.',
      status_standalone_rebuild: 'Standalone mode — rebuild requires MCP host.',
      lbl_total: 'Total Entries',
      lbl_orphan: 'Orphan Entries',
      lbl_contrad: 'Contradictions',
      lbl_broken: 'Broken Links',
      lbl_idxsize: 'Index Size',
      lbl_quality: 'Avg Quality',
      lbl_nodes: 'Graph Nodes',
      lbl_edges: '-- edges',
      lbl_lastcompile: 'Last Compile',
      section_domains: 'Domains',
      section_distribution: 'Domain Distribution',
      empty_title: 'No Data Available',
      empty_desc: 'Click "Refresh" to fetch the knowledge base health report.',
      msg_error_parse: 'Error parsing data: ',
      generated: 'Generated: ',
    }
  };

  let currentLang = localStorage.getItem('mcp-dashboard-lang') || 'zh';
  const isMcpApp = window.parent !== window;

  function t(key) {
    return i18n[currentLang][key] || key;
  }

  function updateI18n() {
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if (el.tagName === 'TITLE') {
        document.title = t(key);
      } else {
        el.textContent = t(key);
      }
    });
    document.getElementById('lang-select').value = currentLang;
    document.documentElement.lang = currentLang === 'zh' ? 'zh-CN' : 'en';
  }

  function changeLang(lang) {
    currentLang = lang;
    localStorage.setItem('mcp-dashboard-lang', lang);
    updateI18n();
  }

  function requestHealth() {
    const btn = document.getElementById('btn-refresh');
    btn.classList.add('refreshing');
    document.getElementById('status-text').textContent = t('status_fetching');

    if (isMcpApp) {
      window.parent.postMessage({ type: 'mcp-tool-call', tool: 'get_health_report', arguments: {} }, '*');
    } else {
      document.getElementById('status-text').textContent = t('status_standalone');
      btn.classList.remove('refreshing');
      showMockData();
    }
  }

  function requestRebuild() {
    if (isMcpApp) {
      window.parent.postMessage({ type: 'mcp-tool-call', tool: 'rebuild_index', arguments: {} }, '*');
      document.getElementById('status-text').textContent = t('status_rebuilding');
    } else {
      document.getElementById('status-text').textContent = t('status_standalone_rebuild');
    }
  }

  function handleMessage(event) {
    if (event.data && event.data.type === 'mcp-tool-result') {
      const btn = document.getElementById('btn-refresh');
      btn.classList.remove('refreshing');
      try {
        const data = typeof event.data.result === 'string'
          ? JSON.parse(event.data.result)
          : event.data.result;
        renderDashboard(data);
      } catch (e) {
        document.getElementById('status-text').textContent = t('msg_error_parse') + e.message;
      }
    }
  }

  function renderDashboard(data) {
    document.getElementById('empty-state').style.display = 'none';
    document.getElementById('dashboard-content').style.display = 'block';

    const dot = document.getElementById('status-dot');
    if (data.total_entries > 0) {
      dot.className = 'dot green';
      document.getElementById('status-text').textContent = t('status_connected_success');
    } else {
      dot.className = 'dot yellow';
      document.getElementById('status-text').textContent = t('status_connected_empty');
    }

    document.getElementById('generated-at').textContent =
      t('generated') + (data.generated_at ? new Date(data.generated_at).toLocaleString() : '--');
    document.getElementById('total-entries').textContent = data.total_entries ?? '--';
    document.getElementById('orphan-count').textContent = data.orphan_count ?? '--';
    document.getElementById('contradiction-count').textContent = data.contradiction_count ?? '--';
    document.getElementById('broken-link-count').textContent = data.broken_link_count ?? '--';
    document.getElementById('index-size').textContent = (data.index_size_mb ?? '--') + ' MB';
    document.getElementById('avg-quality').textContent = data.avg_quality_score ?? '--';
    document.getElementById('graph-nodes').textContent = data.graph_nodes ?? '--';
    document.getElementById('graph-edges').textContent = (data.graph_edges ?? '--') + ' ' + (currentLang === 'zh' ? '条边' : 'edges');

    const lc = data.last_compile;
    document.getElementById('last-compile').textContent = lc
      ? new Date(lc).toLocaleString()
      : (currentLang === 'zh' ? '从未' : 'Never');

    const qEl = document.getElementById('avg-quality');
    const qp = parseFloat(data.avg_quality_score) || 0;
    qEl.className = 'value ' + (qp >= 70 ? 'green' : qp >= 40 ? 'yellow' : 'red');

    const oEl = document.getElementById('orphan-count');
    oEl.className = 'value ' + ((data.orphan_count || 0) === 0 ? 'green' : 'yellow');

    const domains = data.domains || [];
    const dl = document.getElementById('domains-list');
    dl.innerHTML = '';
    domains.forEach(function(d) {
      const span = document.createElement('span');
      span.className = 'tag';
      span.textContent = d;
      dl.appendChild(span);
    });

    renderPieChart(domains, data.total_entries || 1);
  }

  function renderPieChart(domains, total) {
    const area = document.getElementById('pie-chart');
    const legend = document.getElementById('pie-legend');
    area.innerHTML = '';
    legend.innerHTML = '';

    if (domains.length === 0) {
      area.innerHTML = '<svg viewBox="0 0 36 36"><circle cx="18" cy="18" r="15.9" fill="none" stroke="#334155" stroke-width="3"/></svg>';
      return;
    }

    const colors = ['#3b82f6','#22c55e','#eab308','#ef4444','#a855f7','#ec4899','#14b8a6','#f97316','#6366f1','#84cc16'];
    const n = domains.length;
    let offset = 0;
    let svgParts = [];

    for (let i = 0; i < n; i++) {
      const pct = (1 / n) * 100;
      const color = colors[i % colors.length];
      svgParts.push(
        '<circle cx="18" cy="18" r="15.9" fill="none" stroke="' + color +
        '" stroke-width="3" stroke-dasharray="' + pct + ' ' + (100 - pct) +
        '" stroke-dashoffset="-' + offset + '" transform="rotate(-90 18 18)"/>'
      );
      offset += pct;

      const item = document.createElement('div');
      item.className = 'legend-item';
      item.innerHTML = '<div class="legend-color" style="background:' + color + '"></div><span>' + domains[i] + '</span>';
      legend.appendChild(item);
    }

    area.innerHTML = '<svg viewBox="0 0 36 36">' + svgParts.join('') + '</svg>';
  }

  function showMockData() {
    renderDashboard({
      total_entries: 0,
      orphan_count: 0,
      contradiction_count: 0,
      broken_link_count: 0,
      index_size_mb: 0,
      avg_quality_score: '0.0%',
      domains: [],
      graph_nodes: 0,
      graph_edges: 0,
      last_compile: null,
      generated_at: new Date().toISOString(),
    });
  }

  window.addEventListener('message', handleMessage);
  window.requestHealth = requestHealth;
  window.requestRebuild = requestRebuild;
  window.changeLang = changeLang;

  updateI18n();

  if (isMcpApp) {
    requestHealth();
  }
})();
</script>
</body>
</html>
