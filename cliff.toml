# git-cliff configuration for generating CHANGELOG.md
# Based on Conventional Commits: https://www.conventionalcommits.org/
#
# Usage:
#   git cliff -o CHANGELOG.md          # Generate for current tag
#   git cliff --latest -o RELEASE.md   # Generate for latest release only
#   git cliff -l --bump                # Preview next version bump

[changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.
"""
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}]{% if date %} — {{ date | date(format="%Y-%m-%d") }}{% endif %}
{% else %}\
    ## [unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}\
            **{{ commit.scope }}:** \
          {% endif %}\
          {{ commit.message | upper_first }}\
          {% if commit.breaking %}\
            [**BREAKING**]\
          {% endif %}\
          ({{ commit.id | truncate(length=7, end="") }})\
    {% endfor %}
{% endfor %}\n\n
"""
trim = true
postprocessors = [
    { pattern = '<REPO>', replace = "https://github.com/loonghao/rsut_pdf_mcp" },
]

[git]
conventional_commits = true
filter_unconventional = false
commit_parsers = [
    { message = "^feat", group = "Features" },
    { message = "^fix", group = "Bug Fixes" },
    { message = "^perf", group = "Performance" },
    { message = "^refactor", group = "Refactor" },
    { message = "^docs", group = "Documentation" },
    { message = "^style", group = "Styling" },
    { message = "^test", group = "Testing" },
    { message = "^ci", group = "CI/CD" },
    { message = "^build", group = "Build" },
    { message = "^chore", group = "Chores" },
    { message = "^revert", group = "Reverts" },
]
protect_breaking_commits = true
filter_commits = false
tag_pattern = "v[0-9]*"
skip_tags = "v0.1.0-beta.1"
ignore_tags = ""
topo_order = false
sort_commits = "oldest"